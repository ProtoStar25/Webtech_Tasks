<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Technology Workshop Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h1>Workshop Registration</h1>
        <p class="subtitle">National Technology Workshop</p>

        <form id="registrationForm" novalidate>

            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" placeholder="Enter first name">
                    <small class="error" id="firstNameError"></small>
                </div>

                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" placeholder="Enter last name">
                    <small class="error" id="lastNameError"></small>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="example@email.com">
                <small class="error" id="emailError"></small>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password">
                <small class="error" id="passwordError"></small>
                <small class="attempt-info" id="attemptInfo">Maximum password attempts: 3</small>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="option-group">
                    <label><input type="radio" name="gender" value="Male"> Male</label>
                    <label><input type="radio" name="gender" value="Female"> Female</label>
                    <label><input type="radio" name="gender" value="Other"> Other</label>
                </div>
                <small class="error" id="genderError"></small>
            </div>

            <div class="form-group">
                <label>Interests</label>
                <div class="option-group">
                    <label><input type="checkbox" name="interest" value="Web Development"> Web Development</label>
                    <label><input type="checkbox" name="interest" value="Artificial Intelligence"> Artificial Intelligence</label>
                    <label><input type="checkbox" name="interest" value="Cyber Security"> Cyber Security</label>
                </div>
                <small class="error" id="interestError"></small>
            </div>

            <div class="form-group">
                <label for="department">Department</label>
                <select id="department">
                    <option value="">-- Select Department --</option>
                    <option value="CSE">Computer Science and Engineering</option>
                    <option value="EEE">Electrical and Electronic Engineering</option>
                    <option value="BBA">Business Administration</option>
                    <option value="Architecture">Architecture</option>
                </select>
                <small class="error" id="departmentError"></small>
            </div>

            <div class="form-group">
                <label for="about">About Yourself</label>
                <textarea id="about" rows="5" placeholder="Write at least 20 characters about yourself"></textarea>
                <small class="error" id="aboutError"></small>
            </div>

            <button type="submit" id="submitButton">Register</button>

            <div class="success-message" id="successMessage"></div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
