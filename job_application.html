<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Job Application Form</title>
</head>
<body>

    <h1>Online Job Application Form</h1>

    <form method="post">

        <fieldset>
            <legend>Personal Information</legend>

            <label for="fullName">Full Name:</label><br>
            <input type="text" id="fullName" name="fullName"
                   placeholder="Enter your full name" required><br><br>

            <label for="nationalId">National ID Number:</label><br>
            <input type="text" id="nationalId" name="nationalId"
                   placeholder="Enter your National ID number" required><br><br>

            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email"
                   placeholder="example@email.com" required><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"
                   placeholder="Enter your phone number" required><br><br>

            <label for="DOB">Date of Birth:</label><br>
            <input type="date" id="DOB"
                   name="DOB" required><br><br>

            <p>Gender:</p>

            <input type="radio" id="male"
                   name="gender" value="Male" required>
            <label for="male">Male</label><br>

            <input type="radio" id="female"
                   name="gender" value="Female">
            <label for="female">Female</label><br>

            <input type="radio" id="other"
                   name="gender" value="Other">
            <label for="other">Other</label>
        </fieldset>

        <br>

        <fieldset>
            <legend>Job Information</legend>

            <label for="position">Position Applied For:</label><br>

            <select id="position" name="position" required>
                <option value="Software Developer">
                    Software Developer
                </option>
                <option value="Web Designer">Web Designer</option>
                <option value="Network Engineer">Network Engineer</option>
                <option value="Database Administrator">
                    Database Administrator
                </option>
                <option value="IT Support Officer">
                    IT Support Officer
                </option>
            </select>

            <br><br>

            <label for="experience">Experience Level:</label><br>

            <select id="experience" name="experience" required>
                <option value="">Select your experience level</option>
                <option value="Fresher">Fresher</option>
                <option value="1-2 Years">1–2 Years</option>
                <option value="3-5 Years">3–5 Years</option>
                <option value="More Than 5 Years">
                    More Than 5 Years
                </option>
            </select>
        </fieldset>

        <br>

        <fieldset>
            <legend>Technical Skills</legend>

            <input type="checkbox" id="html"
                   name="skills" value="HTML">
            <label for="html">HTML</label><br>

            <input type="checkbox" id="css"
                   name="skills" value="CSS">
            <label for="css">CSS</label><br>

            <input type="checkbox" id="javascript"
                   name="skills" value="JavaScript">
            <label for="javascript">JavaScript</label><br>

            <input type="checkbox" id="python"
                   name="skills" value="Python">
            <label for="python">Python</label><br>

            <input type="checkbox" id="sql"
                   name="skills" value="SQL">
            <label for="sql">SQL</label>
        </fieldset>

        <br>

        <fieldset>
            <legend>Educational Information</legend>

            <label for="qualification">Highest Qualification:</label><br>

            <input type="text" id="qualification"
                   name="qualification"
                   placeholder="Example: BSc in Computer Science"
                   required>

            <br><br>

            <label for="institution">University/College Name:</label><br>

            <input type="text" id="institution"
                   name="institution"
                   placeholder="Enter institution name"
                   required>

            <br><br>

            <label for="graduationYear">Graduation Year:</label><br>

            <input type="number" id="graduationYear"
                   name="graduationYear"
                   min="1950" max="2100"
                   placeholder="Enter graduation year"
                   required>
        </fieldset>

        <br>

        <fieldset>
            <legend>Additional Information</legend>

            <label for="resume">Upload Resume/CV:</label><br>

            <input type="file" id="resume"
                   name="resume"
                   accept=".pdf,.doc,.docx"
                   required>

            <br><br>

            <label for="coverLetter">Cover Letter:</label><br>

            <textarea id="coverLetter"
                      name="coverLetter"
                      rows="8"
                      cols="50"
                      maxlength="300"
                      placeholder="Write your cover letter within 300 characters"></textarea>

            <br><br>

            <label for="address">Current Address:</label><br>

            <textarea id="address"
                      name="address"
                      rows="4"
                      cols="50"
                      placeholder="Enter your current address"
                      required></textarea>
        </fieldset>

        <br>

        <button type="submit">Submit Application</button>
        <button type="reset">Reset Form</button>

    </form>

</body>
</html>
